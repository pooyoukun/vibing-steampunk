# git-cliff configuration
# https://git-cliff.org/docs/configuration

[changelog]
header = """# Changelog

All notable changes to this project will be documented in this file.
The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).\n
"""

body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}\
### {{ group | striptags | trim | upper_first }}

{% for commit in commits %}\
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
{{ commit.message | upper_first }} \
([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/oisee/vibing-steampunk/commit/{{ commit.id }}))
{% endfor %}

{% endfor %}\n
"""

trim = true
footer = ""
# Render the changelog even if there are no releases
render_always = false

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false

commit_preprocessors = [
  # Remove issue numbers from commit messages (they appear in the release notes anyway)
  # { pattern = '\(#(\d+)\)', replace = "([#${1}](https://github.com/oisee/vibing-steampunk/issues/${1}))" },
]

commit_parsers = [
  { message = "^feat",            group = "Features"    },
  { message = "^fix",             group = "Bug Fixes"   },
  { message = "^perf",            group = "Performance" },
  { message = "^revert",          group = "Reverts"     },
  # Skip everything else — docs, tests, chores, refactors, ci, build, etc.
  { message = ".*",               skip = true           },
]

protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9]*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
